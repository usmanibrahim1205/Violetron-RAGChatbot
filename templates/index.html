<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violetron - Glassmorphic Gemini RAG Chatbot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Background Blur Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="app-container">
        <!-- Sidebar Configuration Panel -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">

                <h2>Violetron</h2>
            </div>
            
            <p class="tagline">Gemini-Powered RAG Chatbot</p>

            <!-- API Key Configuration Section -->
            <section class="config-section">
                <h3>
                    <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Gemini API Key
                </h3>
                <div class="input-group">
                    <div class="password-wrapper">
                        <input type="password" id="api-key-input" placeholder="Enter Gemini API Key..." autocomplete="off">
                        <button id="toggle-key-visibility" class="icon-btn" title="Toggle Visibility">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-closed hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="save-locally-checkbox" checked>
                        <label for="save-locally-checkbox">Save locally for convenience</label>
                    </div>
                    <button id="save-key-btn" class="primary-btn">Validate & Save</button>
                    <button id="clear-key-btn" class="danger-btn hidden">Clear Saved Key</button>
                </div>
                <div id="key-status" class="status-indicator info">Key status checking...</div>
            </section>

            <!-- Document Upload Section -->
            <section class="config-section">
                <h3>
                    <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Documents
                </h3>
                <div class="upload-zone" id="drop-zone">
                    <input type="file" id="file-input" accept=".txt,.pdf" style="display: none;">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </div>
                    <p class="upload-text"><strong>Drag & drop file</strong> or <span class="highlight">browse</span></p>
                    <p class="upload-limit">Supports PDF, TXT (Max 10MB)</p>
                </div>
                
                <div id="upload-status" class="status-indicator"></div>

                <!-- Database Info / Loaded Files -->
                <div class="db-info-panel">
                    <div class="db-stat">
                        <span>Loaded Files:</span>
                        <strong id="files-count">0</strong>
                    </div>
                    <div class="db-stat">
                        <span>Text Chunks:</span>
                        <strong id="chunks-count">0</strong>
                    </div>
                    <button id="clear-db-btn" class="secondary-btn" disabled>
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        Clear Database
                    </button>
                </div>
            </section>

            <footer class="sidebar-footer">
            </footer>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container glass-panel">
            <!-- Chat Header Removed -->

            <!-- Messages Window -->
            <section class="messages-window" id="messages-list">
                <!-- Messages will be dynamically rendered here -->
            </section>

            <!-- Message Input Area -->
            <footer class="chat-input-area">
                <div class="input-form">
                    <textarea id="chat-input" placeholder="Ask a question about your document(s)..." rows="1" disabled></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <!-- Input Footer Removed -->
            </footer>
        </main>
    </div>

    <!-- Source Inspect Modal (for RAG inspection) -->
    <div id="sources-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <header class="modal-header">
                <h2>Retrieved Context Sources</h2>
                <button id="close-modal" class="icon-btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </header>
            <div class="modal-body" id="sources-container">
                <!-- Sources list will be dynamically rendered here -->
            </div>
        </div>
    </div>

    <!-- Script Entry -->
    <script src="/static/js/main.js"></script>
</body>
</html>
